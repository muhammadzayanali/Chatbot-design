<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/tablogo.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Braelo Chatbot</title>
    <!-- Sync theme before first paint — avoids flash (FOUC) while React / CSS bundle loads. -->
    <script>
      (function () {
        var k = 'braelo-theme';
        var DEFAULT_THEME = 'dark';
        try {
          var t = localStorage.getItem(k);
          if (t !== 'light' && t !== 'dark') t = DEFAULT_THEME;
          document.documentElement.setAttribute('data-theme', t);
          document.documentElement.style.backgroundColor = t === 'dark' ? '#0F1113' : '#E6E9ED';
          document.documentElement.style.colorScheme = t === 'dark' ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.setAttribute('data-theme', DEFAULT_THEME);
          document.documentElement.style.backgroundColor = '#0F1113';
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
